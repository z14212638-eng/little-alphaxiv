# Little Alphaxiv — CI
#
# Runs the two project gates on every push / PR to main:
#   - frontend: npm run typecheck  (tsc --noEmit — the type gate)
#                npm test          (Vitest)
#   - backend:  python -m pytest   (pytest, per-test temp SQLite via conftest)
#
# There is no lint script on the frontend — typecheck IS the gate (see CLAUDE.md).
# The two jobs run in parallel; a green run is what the README "CI" badge reflects.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a superseded in-flight run when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test (pytest)
        run: python -m pytest
