# Little Alphaxiv — Docker Compose
#
# One-command self-hosted run. The entrypoint auto-generates LAX_SECRET_KEY
# into the ./data volume on first start, so you can simply:
#
#     cd deploy && docker compose up -d
#
# Then open http://127.0.0.1:8000  →  /login  →  Register.
#
# Optional: create a `.env` next to this file (copy from `.env.docker.example`)
# to set SMTP for password recovery, a custom host port, or secure cookies.
#
# Build context is the repo root (..) so the Dockerfile can COPY frontend/ +
# backend/. The data volume (./data) is relative to this file → deploy/data/.

services:
  little-alphaxiv:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: little-alphaxiv:latest
    container_name: little-alphaxiv
    ports:
      - "${LAX_PORT:-8000}:8000"
    environment:
      # Same-origin (frontend served by the backend on :8000) → CORS is normally
      # a non-issue. Origins listed here are for the rare cross-origin embed case.
      LAX_ALLOWED_ORIGINS: "${LAX_ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}"
      LAX_SECURE_COOKIES: "${LAX_SECURE_COOKIES:-false}"
      LAX_SESSION_MAX_AGE_DAYS: "${LAX_SESSION_MAX_AGE_DAYS:-30}"
      # Empty → password-reset links are printed to the container logs.
      LAX_SMTP_URL: "${LAX_SMTP_URL:-}"
      LAX_SMTP_FROM: "${LAX_SMTP_FROM:-}"
      LAX_PASSWORD_RESET_TTL_MIN: "${LAX_PASSWORD_RESET_TTL_MIN:-30}"
      # Proxy for Zotero WEB calls ONLY (api.zotero.org). Docker Desktop's
      # container egress bypasses the host's system proxy, so from inside a
      # container api.zotero.org is reached over the raw NIC — which from
      # networks that throttle it produces persistent ReadTimeout / RST. Set
      # this to a proxy the container can reach (Clash/V2Ray "Allow LAN" on,
      # binding 0.0.0.0:7890) so Zotero routes through the clean host path.
      # Empty = direct (current behavior). Only Zotero web is affected;
      # arXiv / PDF / LLM stay direct.
      LAX_ZOTERO_PROXY: "${LAX_ZOTERO_PROXY:-}"
      # web_search tool (anysearch MCP over HTTP). Without a key, /api/websearch
      # returns configured:false and the LLM falls back to academic search tools.
      ANYSEARCH_API_KEY: "${ANYSEARCH_API_KEY:-}"
      LAX_ANYSEARCH_URL: "${LAX_ANYSEARCH_URL:-}"
    volumes:
      # SQLite DB + PDF cache + the persisted LAX_SECRET_KEY all live here.
      - ./data:/app/data
    restart: unless-stopped
    # Tiny health probe: the backend exposes GET /api/health.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
